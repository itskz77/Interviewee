<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graduate Interview Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F5F0E8; --ink: #1A1714; --ink-light: #5A5350; --ink-faint: #9A9390;
    --accent: #C4622D; --accent-light: #F0DDD3; --surface: #FDFAF5; --border: #E2DDD6;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 1rem; background: var(--surface); }
  header h1 { font-family: 'Instrument Serif', serif; font-size: 1.5rem; font-weight: 400; }
  header span { font-size: 0.75rem; background: var(--accent-light); color: var(--accent); padding: 3px 10px; border-radius: 99px; font-weight: 500; }
  main { flex: 1; max-width: 760px; width: 100%; margin: 0 auto; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }
  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.75rem; }
  .q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .q-tag { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); background: var(--accent-light); padding: 3px 10px; border-radius: 99px; }
  .q-num { font-size: 0.78rem; color: var(--ink-faint); }
  .q-text { font-family: 'Instrument Serif', serif; font-size: 1.3rem; line-height: 1.55; margin-bottom: 1.25rem; white-space: pre-line; }
  .q-hint { font-size: 0.78rem; color: var(--ink-faint); font-style: italic; border-top: 1px solid var(--border); padding-top: 0.875rem; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  button { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; border-radius: 99px; border: none; cursor: pointer; transition: all 0.15s; padding: 9px 20px; }
  .btn-primary { background: var(--ink); color: #fff; }
  .btn-primary:hover { background: var(--accent); }
  .btn-ghost { background: transparent; color: var(--ink-light); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--border); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { opacity: 0.88; }
  .btn-accent:disabled { opacity: 0.4; cursor: not-allowed; }
  .answer-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }
  .answer-section h3 { font-family: 'Instrument Serif', serif; font-size: 1rem; font-weight: 400; margin-bottom: 1rem; }
  .audio-row { display: flex; align-items: center; gap: 10px; margin-bottom: 0.875rem; flex-wrap: wrap; }
  .rec-btn { display: flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 99px; font-size: 0.8rem; font-weight: 500; background: var(--accent-light); color: var(--accent); border: 1px solid #E8C4B2; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .rec-btn:hover { background: #E8C4B2; }
  .rec-btn.recording { background: #FDE8E8; color: #C0392B; border-color: #F5C6C6; animation: pulse 1.2s infinite; }
  .rec-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .rec-timer { font-size: 0.78rem; color: var(--ink-faint); font-variant-numeric: tabular-nums; }
  .audio-status { font-size: 0.78rem; color: var(--ink-faint); padding: 6px 0; }
  .audio-status.ready { color: #2D6A4F; }
  .divider { display: flex; align-items: center; gap: 10px; margin: 0.75rem 0; color: var(--ink-faint); font-size: 0.75rem; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--border); }
  textarea { width: 100%; min-height: 130px; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; line-height: 1.7; color: var(--ink); background: var(--cream); border: 1px solid var(--border); border-radius: 10px; padding: 0.875rem 1rem; resize: vertical; outline: none; transition: border-color 0.15s; margin-bottom: 1rem; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--ink-faint); }
  .eval-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .eval-section h3 { font-family: 'Instrument Serif', serif; font-size: 1rem; font-weight: 400; margin-bottom: 1.25rem; }
  .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.25rem; }
  .score-card { background: var(--cream); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; text-align: center; }
  .score-label { font-size: 0.65rem; color: var(--ink-faint); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1.3; }
  .score-val { font-family: 'Instrument Serif', serif; font-size: 1.7rem; line-height: 1; color: var(--ink); }
  .score-val .out { font-size: 0.65rem; color: var(--ink-faint); }
  .eval-body { font-size: 0.85rem; line-height: 1.8; color: var(--ink-light); white-space: pre-wrap; }
  .eval-body strong { color: var(--ink); font-weight: 500; display: block; margin-top: 1rem; margin-bottom: 0.25rem; }
  .eval-body strong:first-child { margin-top: 0; }
  .loading-wrap { text-align: center; padding: 1.5rem 0; }
  .loading-dots { display: inline-flex; gap: 6px; }
  .loading-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: dot 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,80%,100%{opacity:0.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }
  .loading-text { font-size: 0.78rem; color: var(--ink-faint); margin-top: 0.75rem; }
  .error-msg { background: #FDE8E8; color: #C0392B; border-radius: 10px; padding: 10px 14px; font-size: 0.8rem; margin-top: 0.75rem; }
  .hidden { display: none; }
  .session-info { font-size: 0.75rem; color: var(--ink-faint); }
  @media (max-width: 500px) { .score-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
<header>
  <h1>Graduate Interview Prep</h1>
  <span>Humanities & Social Sciences</span>
</header>
<main>
  <div class="q-card">
    <div class="q-meta">
      <span class="q-tag" id="q-tag">—</span>
      <span class="q-num" id="q-num">Question 1</span>
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="q-hint" id="q-hint"></div>
  </div>

  <div class="btn-row">
    <button class="btn-ghost" onclick="nextQuestion()">Skip / New question →</button>
  </div>

  <div class="answer-section">
    <h3>Your answer / 你的回答</h3>
    <div class="audio-row">
      <button class="rec-btn" id="rec-btn" onclick="toggleRecording()">
        <span class="rec-dot"></span>
        <span id="rec-label">Record answer</span>
      </button>
      <span class="rec-timer hidden" id="rec-timer">0:00</span>
    </div>
    <div class="audio-status hidden" id="audio-status"></div>
    <div class="divider">or type your answer</div>
    <textarea id="answer-text" placeholder="Type your answer here... / 在这里输入你的答案..."></textarea>
    <div class="btn-row">
      <button class="btn-accent" id="eval-btn" onclick="runEval()">Evaluate my answer</button>
      <button class="btn-ghost" onclick="clearAnswer()">Clear</button>
    </div>
    <div id="error-msg" class="error-msg hidden"></div>
  </div>

  <div class="eval-section hidden" id="eval-section">
    <h3>Evaluation / 评估结果</h3>
    <div class="loading-wrap" id="loading-wrap">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div class="loading-text">Evaluating... / 正在评估...</div>
    </div>
    <div id="eval-content" class="hidden">
      <div class="score-grid" id="score-grid"></div>
      <div class="eval-body" id="eval-body"></div>
      <br>
      <div class="btn-row">
        <button class="btn-primary" onclick="nextQuestion()">Next question →</button>
        <button class="btn-ghost" onclick="runEval()">Re-evaluate</button>
      </div>
    </div>
  </div>

  <div class="session-info" id="session-info">Session started</div>
</main>

<script>
const questions = [
  { tag:"Motivation", en:"Why do you want to pursue graduate study in this field, and why now?", zh:"你为什么想在这个领域攻读研究生？为什么是现在？", hint:"Be specific about your intellectual journey, not just career goals." },
  { tag:"Research", en:"Describe a research project or extended piece of work you are proud of. What did you learn from it?", zh:"描述一个你引以为豪的研究项目，你从中学到了什么？", hint:"Examiners want critical reflection, not just a summary of what you did." },
  { tag:"Critical Thinking", en:"What is a major debate or unresolved question in your field that you find compelling?", zh:"你觉得你的研究领域中有哪个重要争论或未解决的问题令你着迷？", hint:"Show you can hold multiple perspectives and engage with complexity." },
  { tag:"Methodology", en:"What research methods are you familiar with, and which would you use for your proposed research?", zh:"你熟悉哪些研究方法？你会为你计划的研究选择哪种方法？", hint:"Justify your choices and show awareness of their limitations." },
  { tag:"Academic Fit", en:"Why have you applied to this particular program, and what do you hope to contribute?", zh:"你为什么申请这个特定的项目？你希望为项目做出什么贡献？", hint:"Show genuine knowledge of the faculty and program — not just rankings." },
  { tag:"Challenges", en:"Describe a time you encountered a significant intellectual challenge. How did you approach it?", zh:"描述一次你遇到重大智识挑战的经历，你是如何应对的？", hint:"Honesty about struggle is valued more than a perfect narrative." },
  { tag:"Ethics", en:"Are there ethical dimensions or tensions in your proposed research area? How would you navigate them?", zh:"你计划研究的领域是否存在伦理问题或张力？你会如何处理？", hint:"Especially important for social sciences — show genuine ethical awareness." },
  { tag:"Influence", en:"Which thinker, text, or idea has most shaped your intellectual development, and why?", zh:"哪位思想家、著作或观念对你的智识发展影响最大？为什么？", hint:"Be prepared to discuss the work in depth and engage with it critically." },
  { tag:"Future", en:"Where do you see your research taking you in five to ten years?", zh:"你认为你的研究在五到十年后会把你带向何处？", hint:"Ambition is good, but show awareness of academic realities." },
  { tag:"Collaboration", en:"How do you engage with ideas or perspectives that challenge or contradict your own?", zh:"当你遇到挑战或与你相悖的观点时，你如何回应？", hint:"Graduate study is collaborative — intellectual humility matters." },
  { tag:"Writing", en:"Tell us about a piece of academic writing you have produced. What would you do differently now?", zh:"请介绍一篇你写过的学术文章，如果重写你会做哪些改变？", hint:"Self-awareness and growth mindset are key signals here." },
  { tag:"Literature", en:"What do you see as the most significant gap in the existing literature in your area?", zh:"你认为你所在领域的现有文献中最重要的空白是什么？", hint:"This tests your literature knowledge and capacity for original thinking." },
];

let currentQ = null;
let qCount = 0;
let mediaRecorder = null;
let audioChunks = [];
let recordingTimer = null;
let recordingSeconds = 0;

function pickQuestion() {
  const pool = questions.filter(q => q !== currentQ);
  return pool[Math.floor(Math.random() * pool.length)];
}

function loadQuestion(q) {
  currentQ = q;
  qCount++;
  document.getElementById('q-tag').textContent = q.tag;
  document.getElementById('q-num').textContent = `Question ${qCount}`;
  document.getElementById('q-text').textContent = q.en + '\n\n' + q.zh;
  document.getElementById('q-hint').textContent = 'Tip: ' + q.hint;
  document.getElementById('eval-section').classList.add('hidden');
  document.getElementById('session-info').textContent = `${qCount} question${qCount > 1 ? 's' : ''} attempted this session`;
}

function nextQuestion() {
  clearAnswer();
  loadQuestion(pickQuestion());
}

function clearAnswer() {
  document.getElementById('answer-text').value = '';
  document.getElementById('audio-status').classList.add('hidden');
  document.getElementById('error-msg').classList.add('hidden');
  document.getElementById('eval-section').classList.add('hidden');
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.remove('hidden');
}

async function toggleRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    const mimeType = ['audio/mp4','audio/ogg;codecs=opus','audio/webm;codecs=opus','audio/webm']
      .find(t => MediaRecorder.isTypeSupported(t)) || '';
    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      stopTimer();
      document.getElementById('rec-btn').classList.remove('recording');
      document.getElementById('rec-label').textContent = 'Record again';
      document.getElementById('rec-timer').classList.add('hidden');
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      const statusEl = document.getElementById('audio-status');
      statusEl.classList.remove('hidden');
      statusEl.textContent = `Recording saved (${(blob.size/1024).toFixed(0)} KB) — please type a summary of what you said below.`;
    };
    mediaRecorder.start(100);
    startTimer();
    document.getElementById('rec-btn').classList.add('recording');
    document.getElementById('rec-label').textContent = 'Stop recording';
    document.getElementById('rec-timer').classList.remove('hidden');
  } catch(e) {
    showError('Microphone access denied. Please type your answer instead.');
  }
}

function startTimer() {
  recordingSeconds = 0;
  recordingTimer = setInterval(() => {
    recordingSeconds++;
    const m = Math.floor(recordingSeconds / 60);
    const s = recordingSeconds % 60;
    document.getElementById('rec-timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}

function stopTimer() { clearInterval(recordingTimer); }

async function runEval() {
  const textAnswer = document.getElementById('answer-text').value.trim();
  if (!textAnswer) {
    showError('Please type your answer first. / 请先输入你的答案。');
    return;
  }
  document.getElementById('error-msg').classList.add('hidden');
  const evalSection = document.getElementById('eval-section');
  evalSection.classList.remove('hidden');
  document.getElementById('loading-wrap').classList.remove('hidden');
  document.getElementById('eval-content').classList.add('hidden');
  document.getElementById('eval-btn').disabled = true;

  const prompt = `You are a rigorous but fair graduate admissions interviewer evaluating a candidate applying to a Humanities or Social Sciences MA/PhD program.

Interview question: "${currentQ.en}"
Candidate's answer: "${textAnswer}"

Evaluate using these 4 criteria, each scored out of 10:
1. Intellectual Depth (深度): Sophisticated thinking, engagement with complexity, scholarly curiosity
2. Specificity & Evidence (具体性): Specific examples, texts, thinkers vs. vague generalities
3. Critical Awareness (批判意识): Awareness of limitations, counterarguments, alternative perspectives
4. Academic Communication (表达): Structure, articulation, register appropriate for a graduate interview

Respond in this EXACT JSON format only — no markdown, no extra text:
{"scores":{"depth":7,"specificity":6,"critical":7,"communication":8},"summary_en":"2-3 sentence overall assessment.","strengths_en":"2-3 specific strengths.","improvements_en":"2-3 specific actionable improvements.","summary_zh":"2-3句中文总体评价。","improvements_zh":"2-3条具体改进建议。"}`;

  try {
    const res = await fetch('/api/evaluate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();
    const raw = data.content.map(i => i.text || '').join('');
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Could not parse response');
    const parsed = JSON.parse(jsonMatch[0]);
    document.getElementById('loading-wrap').classList.add('hidden');
    document.getElementById('eval-content').classList.remove('hidden');
    renderEval(parsed);
  } catch(e) {
    document.getElementById('loading-wrap').classList.add('hidden');
    evalSection.classList.add('hidden');
    showError(`Evaluation failed: ${e.message} — please try again.`);
  } finally {
    document.getElementById('eval-btn').disabled = false;
  }
}

function renderEval(data) {
  const criteria = [
    { key:'depth', en:'Intellectual Depth', zh:'深度' },
    { key:'specificity', en:'Specificity', zh:'具体性' },
    { key:'critical', en:'Critical Awareness', zh:'批判意识' },
    { key:'communication', en:'Communication', zh:'表达' },
  ];
  const grid = document.getElementById('score-grid');
  grid.innerHTML = '';
  criteria.forEach(c => {
    const val = data.scores[c.key] || 0;
    const card = document.createElement('div');
    card.className = 'score-card';
    card.innerHTML = `<div class="score-label">${c.en}<br>${c.zh}</div><div class="score-val">${val}<span class="out">/10</span></div>`;
    grid.appendChild(card);
  });
  const body = document.getElementById('eval-body');
  body.innerHTML = '';
  [
    { label:'Overall / 总评', text:(data.summary_en||'')+'\n'+(data.summary_zh||'') },
    { label:'Strengths / 优点', text:data.strengths_en||'' },
    { label:'How to improve / 改进建议', text:(data.improvements_en||'')+'\n\n'+(data.improvements_zh||'') },
  ].forEach(s => {
    const strong = document.createElement('strong');
    strong.textContent = s.label;
    body.appendChild(strong);
    body.appendChild(document.createTextNode(s.text.trim()));
  });
}

loadQuestion(pickQuestion());
</script>
</body>
</html>
